# OpenSportTaxonomy — Garmin Training API V2 mapping
#
# Bidirectional. Every target appears exactly once: the mapping is a
# bijection. Reverse lookup is derived automatically; encode and decode
# share this data. See docs/translation.md for the algorithm.

platform: garmin_training_api
platform_version: "V2 1.0 (2025-05-26)"
fallback: GENERIC

mappings:

  - ost: cycling
    target: CYCLING

  - ost: generic
    target: GENERIC

  - ost: running
    target: RUNNING

  - ost: swimming
    target: LAP_SWIMMING
