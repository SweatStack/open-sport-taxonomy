# OpenSportTaxonomy — garmin_fit mapping.
#
# See docs/translation.md for the format specification.
# See CONTRIBUTING.md for the workflow.

platform: garmin_fit
platform_version: "FIT SDK 21.133"

fallback:
  encode: { sport:   0, sub_sport:   0 }
  decode: generic

target_coarsening:
  - reset: { sub_sport: 0 }
  - reset: { sport: 0, sub_sport: 0 }

entries:

  - target: { sport:   0, sub_sport:   0 }  # generic / generic
    sport: generic
    preferred: true

  - target: { sport:   1, sub_sport:   0 }  # running / generic
    sport: running.road      # opinionated: Garmin has no road profile, so road runs are written as generic
    preferred: true
    encode_for: [running]  # bare "running" also encodes to generic (not to the dead 'street' code)

  - target: { sport:   1, sub_sport:   1 }  # running / treadmill
    sport: running+stationary
    preferred: true

  - target: { sport:   1, sub_sport:   2 }  # running / street
    sport: running.road      # legacy 'street' code, unused by modern devices; decodes to road, encodes nothing

  - target: { sport:   1, sub_sport:   3 }  # running / trail
    sport: running.trail
    preferred: true

  - target: { sport:   1, sub_sport:   4 }  # running / track
    sport: running.track
    preferred: true

  - target: { sport:   1, sub_sport:  45 }  # running / indoor_running
    sport: running

  - target: { sport:   1, sub_sport:  58 }  # running / virtual_activity
    sport: running+stationary+virtual
    preferred: true

  - target: { sport:   2, sub_sport:   0 }  # cycling / generic
    sport: cycling.road      # opinionated: modern Garmin has no road profile, so road rides are written as generic
    preferred: true
    encode_for: [cycling]  # bare "cycling" also encodes to generic (not to the legacy 'road' code)

  - target: { sport:   2, sub_sport:   5 }  # cycling / spin
    sport: cycling+stationary

  - target: { sport:   2, sub_sport:   6 }  # cycling / indoor_cycling
    sport: cycling+stationary
    preferred: true

  - target: { sport:   2, sub_sport:   7 }  # cycling / road
    sport: cycling.road      # legacy FR735-era road code; decodes to road, encodes nothing

  - target: { sport:   2, sub_sport:   8 }  # cycling / mountain
    sport: cycling.mountain
    preferred: true

  - target: { sport:   2, sub_sport:   9 }  # cycling / downhill
    sport: cycling.mountain

  - target: { sport:   2, sub_sport:  10 }  # cycling / recumbent
    sport: cycling

  - target: { sport:   2, sub_sport:  11 }  # cycling / cyclocross
    sport: cycling.cyclocross
    preferred: true

  - target: { sport:   2, sub_sport:  12 }  # cycling / hand_cycling
    sport: hand_cycling
    preferred: true

  - target: { sport:   2, sub_sport:  13 }  # cycling / track_cycling
    sport: cycling.track
    preferred: true

  - target: { sport:   2, sub_sport:  29 }  # cycling / bmx
