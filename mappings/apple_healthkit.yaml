# OpenSportTaxonomy — Apple HealthKit mapping
#
# Bidirectional. Every target appears exactly once: the mapping is a
# bijection. Reverse lookup is derived automatically; encode and decode
# share this data. See docs/translation.md for the algorithm.

platform: apple_healthkit
platform_version: "iOS 18"
fallback: 3000  # other

mappings:

  - ost: cycling
    target: 13  # cycling

  - ost: generic
    target: 3000  # other

  - ost: rowing
    target: 35  # rowing

  - ost: running
    target: 37  # running

  - ost: swimming
    target: 46  # swimming

  - ost: walking
    target: 52  # walking

  - ost: walking.hiking
    target: 24  # hiking

  - ost: xc_skiing
    target: 60  # crossCountrySkiing

  - ost: xc_skiing
    modifiers: [roller]
    target: 30  # inlineSkate
