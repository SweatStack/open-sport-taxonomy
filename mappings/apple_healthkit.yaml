# OpenSportTaxonomy — Apple HealthKit mapping
# See README.md for how mappings work.

platform: apple_healthkit
platform_version: "iOS 18"
fallback: 3000  # other

mappings:

  - ost: cycling
    target: 13  # cycling

  - ost: cycling.cyclocross
    target: 13  # cycling

  - ost: cycling.gravel
    target: 13  # cycling

  - ost: cycling.mountain
    target: 13  # cycling

  - ost: cycling.road
    target: 13  # cycling

  - ost: cycling.time_trial
    target: 13  # cycling

  - ost: cycling.track
    target: 13  # cycling

  - ost: generic
    target: 3000  # other

  - ost: rowing
    target: 35  # rowing

  - ost: running
    target: 37  # running

  - ost: running.road
    target: 37  # running

  - ost: running.track
    target: 37  # running

  - ost: running.trail
    target: 37  # running

  - ost: swimming
    target: 46  # swimming

  - ost: swimming.open_water
    target: 46  # swimming

  - ost: swimming.pool
    target: 46  # swimming

  - ost: walking
    target: 52  # walking

  - ost: walking.hiking
    target: 24  # hiking

  - ost: xc_skiing
    target: 60  # crossCountrySkiing

  - ost: xc_skiing
    modifiers: [roller]
    target: 30  # inlineSkate

  - ost: xc_skiing.classic
    target: 60  # crossCountrySkiing

  - ost: xc_skiing.classic
    modifiers: [roller]
    target: 30  # inlineSkate

  - ost: xc_skiing.double_poling
    target: 60  # crossCountrySkiing

  - ost: xc_skiing.double_poling
    modifiers: [roller]
    target: 30  # inlineSkate

  - ost: xc_skiing.skate
    target: 60  # crossCountrySkiing

  - ost: xc_skiing.skate
    modifiers: [roller]
    target: 30  # inlineSkate
