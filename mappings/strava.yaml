# OpenSportTaxonomy — Strava mapping
# See README.md for how mappings work.

platform: strava
platform_version: "v3 API, 2024"
fallback: Workout

mappings:

  - ost: cycling
    target: Ride

  - ost: cycling.cyclocross
    target: Ride

  - ost: cycling.gravel
    target: GravelRide

  - ost: cycling.mountain
    target: MountainBikeRide

  - ost: cycling.mountain
    modifiers: [assisted]
    target: EMountainBikeRide

  - ost: cycling.road
    target: Ride

  - ost: cycling.road
    modifiers: [assisted]
    target: EBikeRide

  - ost: cycling.road
    modifiers: [virtual]
    target: VirtualRide

  - ost: cycling.time_trial
    target: Ride

  - ost: cycling.track
    target: Ride

  - ost: generic
    target: Workout

  - ost: rowing
    target: Rowing

  - ost: rowing
    modifiers: [virtual]
    target: VirtualRow

  - ost: running
    target: Run

  - ost: running.road
    target: Run

  - ost: running.road
    modifiers: [virtual]
    target: VirtualRun

  - ost: running.track
    target: Run

  - ost: running.trail
    target: TrailRun

  - ost: swimming
    target: Swim

  - ost: swimming.open_water
    target: Swim

  - ost: swimming.pool
    target: Swim

  - ost: walking
    target: Walk

  - ost: walking.hiking
    target: Hike

  - ost: xc_skiing
    target: NordicSki

  - ost: xc_skiing.backcountry
    target: BackcountrySki

  - ost: xc_skiing.classic
    target: NordicSki

  - ost: xc_skiing.roller
    target: RollerSki

  - ost: xc_skiing.roller.classic
    target: RollerSki

  - ost: xc_skiing.roller.skate
    target: RollerSki

  - ost: xc_skiing.skate
    target: NordicSki
