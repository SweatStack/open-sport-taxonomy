# OpenSportTaxonomy — Strava mapping
#
# Bidirectional. Every target appears exactly once: the mapping is a
# bijection. Reverse lookup is derived automatically; encode and decode
# share this data. See docs/translation.md for the algorithm.

platform: strava
platform_version: "v3 API, 2024"
fallback: Workout

mappings:

  - ost: cycling
    target: Ride

  - ost: cycling.gravel
    target: GravelRide

  - ost: cycling.mountain
    target: MountainBikeRide

  - ost: cycling.mountain
    modifiers: [assisted]
    target: EMountainBikeRide

  - ost: cycling.road
    modifiers: [assisted]
    target: EBikeRide

  - ost: cycling.road
    modifiers: [virtual]
    target: VirtualRide

  - ost: generic
    target: Workout

  - ost: rowing
    target: Rowing

  - ost: rowing
    modifiers: [virtual]
    target: VirtualRow

  - ost: running
    target: Run

  - ost: running.road
    modifiers: [virtual]
    target: VirtualRun

  - ost: running.trail
    target: TrailRun

  - ost: swimming
    target: Swim

  - ost: walking
    target: Walk

  - ost: walking.hiking
    target: Hike

  - ost: xc_skiing
    target: NordicSki

  - ost: xc_skiing
    modifiers: [roller]
    target: RollerSki
