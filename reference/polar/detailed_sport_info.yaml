# Polar AccessLink — detailed_sport_info enumeration.
#
# Source of truth, hand-transcribed from the HTML appendix at
# https://www.polar.com/accesslink-api/#detailed-sport-info-values-in-exercise-entity
# (the swagger declares detailed-sport-info as a bare string and does not
# enumerate these values). `flow_label` is the human-readable "Sport in Polar
# Flow" name, kept for review and mapping comments. Only `value` is the target.
#
# See README.md. Pin platform_version in mappings/polar.yaml to the AccessLink
# API version + fetch date.

