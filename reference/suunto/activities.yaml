# Suunto — activity ID enumeration.
#
# Source of truth, hand-transcribed from Activities.pdf (text layer extracted
# with `pdftotext -layout`). Suunto publishes no machine-readable enum. `name`
# is the Suunto activity label (not unique — IDs 4-9 are all "Sports"); only
# `value` (the activity ID) is the mapping target. ID 89 is unassigned.
#
# See README.md. Pin platform_version in mappings/suunto.yaml to the source +
# fetch date.

