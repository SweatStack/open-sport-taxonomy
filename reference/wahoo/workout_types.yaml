# Wahoo Cloud API — workout_type_id enumeration.
#
# Source of truth, hand-transcribed from the HTML docs at
# https://cloud-api.wahooligan.com/#data-types (Wahoo publishes no
# machine-readable enum). `family` and `location` are fixed attributes of each
# type, kept here for human review and mapping audit only — only `value`
# (workout_type_id) is used as the mapping target.
#
# Pin `platform_version` in mappings/wahoo.yaml to the changelog date at the
# bottom of the docs page. See README.md.

